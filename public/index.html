  <script type="module" src="./js/app.js"></script>

  <script>
    // --- ENRUTAMIENTO + SEO DINÁMICO MEJORADO ---
    const routes = {
      '/catalogo': 'catalog',
      '/ofertas': 'offers',
      '/tips': 'tips',
      '/': 'catalog',
      '': 'catalog'
    };

    function getPageNameFromPath(path) {
      const normalizedPath = path.toLowerCase().replace(/\/$/, '');
      return routes[normalizedPath] || routes['/'];
    }

    function navigate(path, shouldPushState = true) {
      const pageName = getPageNameFromPath(path);
      if (shouldPushState) {
        history.pushState({ page: pageName }, '', path);
      }

      // === SEO DINÁMICO MEJORADO ===
      const seoData = {
        '/catalogo': {
          title: 'Catálogo de Velas | Glowie - Cali',
          description: 'Descubre velas artesanales de cera de soja 100% natural. Diseños únicos, aromas premium. Envío gratis en Cali desde $50.000.',
          ogImage: 'https://res.cloudinary.com/du3kkvkmy/image/upload/f_auto,q_auto/v1762141308/anis_amarillo_ftb5xv.webp'
        },
        '/ofertas': {
          title: 'Ofertas en Velas | Glowie - Descuentos Exclusivos',
          description: 'Ofertas limitadas: 2x1, 20% OFF. Velas Glowie a precios especiales. ¡Stock limitado!',
          ogImage: 'https://res.cloudinary.com/du3kkvkmy/image/upload/f_auto,q_auto/v1762141079/flama_amarillo_tiioli.webp'
        },
        '/tips': {
          title: 'Tips de Cuidado de Velas | Glowie',
          description: 'Aprende a cuidar tus velas: primer encendido, mecha corta, quema uniforme. Guía completa de Glowie.',
          ogImage: 'https://res.cloudinary.com/du3kkvkmy/image/upload/f_auto,q_auto/v1762141054/jarron_vacio_dsoypn.webp'
        }
      };

      const data = seoData[path] || {
        title: 'Glowie | Velas Artesanales en Cali',
        description: 'Velas de soja natural, hechas a mano en Cali. Aromas que transforman tu espacio. Envío gratis desde $50.000.',
        ogImage: 'https://res.cloudinary.com/du3kkvkmy/image/upload/f_auto,q_auto/v1762141308/anis_amarillo_ftb5xv.webp'
      };

      // Título
      document.title = data.title;

      // Meta description
      let desc = document.querySelector('meta[name="description"]');
      if (!desc) { desc = document.createElement('meta'); desc.name = 'description'; document.head.appendChild(desc); }
      desc.content = data.description;

      // Open Graph
      ['og:title', 'og:description', 'og:image', 'og:url', 'og:type'].forEach(prop => {
        let tag = document.querySelector(`meta[property="${prop}"]`);
        if (!tag) { tag = document.createElement('meta'); tag.setAttribute('property', prop); document.head.appendChild(tag); }
        if (prop === 'og:title') tag.content = data.title;
        if (prop === 'og:description') tag.content = data.description;
        if (prop === 'og:image') tag.content = data.ogImage;
        if (prop === 'og:url') tag.content = window.location.href;
        if (prop === 'og:type') tag.content = 'website';
      });

      // Resto del código original
      document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.toggle('active', link.getAttribute('href').toLowerCase() === path.toLowerCase());
      });

      if (typeof window.loadAppContent === 'function') {
        window.loadAppContent(pageName);
      } else {
        document.getElementById('app-content').innerHTML = `
          <h1 class="text-3xl font-bold text-center mb-6">Página: ${pageName.toUpperCase()}</h1>
          <p class="text-center text-gray-600">Ruta: <strong>${path}</strong></p>`;
      }

      const mobileMenu = document.getElementById('mobile-menu');
      if (mobileMenu && !mobileMenu.classList.contains('hidden')) {
        mobileMenu.classList.add('hidden');
      }

      // GA4 page_view
      if (typeof gtag === 'function') {
        gtag('event', 'page_view', {
          page_path: path,
          page_title: document.title
        });
      }
    }

    // === EVENTOS ===
    document.addEventListener('click', e => {
      const link = e.target.closest('a.link-route');
      if (link && link.getAttribute('href')?.startsWith('/')) {
        e.preventDefault();
        navigate(link.getAttribute('href'));
      }
    });

    window.addEventListener('popstate', () => navigate(window.location.pathname, false));

    window.addEventListener('load', () => {
      let initialPath = window.location.pathname;
      if (initialPath === '/' || !routes[initialPath.toLowerCase()]) {
        history.replaceState({ page: 'catalog' }, '', '/catalogo');
        initialPath = '/catalogo';
      }
      navigate(initialPath, false);
    });

    document.getElementById('hamburger-btn').addEventListener('click', () => {
      document.getElementById('mobile-menu').classList.toggle('hidden');
    });

    document.addEventListener('click', e => {
      const menu = document.getElementById('mobile-menu');
      const btn = document.getElementById('hamburger-btn');
      if (menu && btn && !menu.contains(e.target) && !btn.contains(e.target)) {
        menu.classList.add('hidden');
      }
    });

    // TRACKING: WhatsApp flotante
    function trackWhatsappFloatClick() {
      if (typeof gtag === 'function') {
        gtag('event', 'whatsapp_float_click', {
          event_category: 'engagement',
          event_label: 'float_button',
          value: 1,
          currency: 'COP'
        });
        console.log('GA4: Click en botón flotante de WhatsApp');
      }
    }
  </script>
